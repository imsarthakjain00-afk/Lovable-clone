version: '3.8'

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Sarthak@108
      POSTGRES_DB: Lovable_Clone_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - FRONTEND_URL=http://localhost:5173
      - DB_CONNECTION=postgresql://postgres:Sarthak%40108@db:5432/Lovable_Clone_db
      # Add other necessary env vars from your backend/.env here, or uncomment the env_file line below:
      # env_file:
      #   - ./backend/.env
    depends_on:
      - db
    volumes:
      # Optional: Mount the backend directory for live-reloading (though you need to change CMD to include --reload in Dockerfile)
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      # If you have Vite env vars, add them here
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
